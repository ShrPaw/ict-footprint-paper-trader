<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICT Paper Trader — Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'SF Mono', 'Fira Code', monospace; background: #0a0a0f; color: #e0e0e0; padding: 20px; }
    h1 { font-size: 1.4em; color: #fff; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 0.8em; margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .card { background: #12121a; border: 1px solid #1e1e2e; border-radius: 8px; padding: 16px; }
    .card .label { font-size: 0.7em; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .card .value { font-size: 1.6em; font-weight: bold; }
    .card .value.green { color: #22c55e; }
    .card .value.red { color: #ef4444; }
    .card .value.blue { color: #3b82f6; }
    .card .value.yellow { color: #eab308; }
    .card .value.gray { color: #666; }

    .section { margin-bottom: 24px; }
    .section h2 { font-size: 1em; color: #888; margin-bottom: 12px; border-bottom: 1px solid #1e1e2e; padding-bottom: 8px; }

    table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
    th { text-align: left; color: #666; font-weight: normal; padding: 8px 12px; border-bottom: 1px solid #1e1e2e; }
    td { padding: 8px 12px; border-bottom: 1px solid #0e0e16; }
    tr:hover td { background: #16161f; }

    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75em; font-weight: bold; }
    .tag-long { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
    .tag-short { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    .tag-win { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
    .tag-loss { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

    .pos-card { background: #12121a; border: 1px solid #1e1e2e; border-radius: 8px; padding: 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .pos-card .symbol { font-size: 1.2em; font-weight: bold; }
    .pos-card .details { color: #888; font-size: 0.8em; }

    .btn { background: #1e1e2e; border: 1px solid #2e2e3e; color: #e0e0e0; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.8em; }
    .btn:hover { background: #2e2e3e; }
    .btn-danger { border-color: #ef4444; color: #ef4444; }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.1); }

    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .status { display: inline-flex; align-items: center; gap: 6px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .empty { color: #444; font-style: italic; padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>📊 ICT Paper Trader</h1>
      <div class="subtitle">TradingView Paper Trading Dashboard</div>
    </div>
    <div style="display: flex; gap: 12px; align-items: center;">
      <div class="status"><div class="status-dot"></div> Live</div>
      <button class="btn btn-danger" onclick="resetAccount()">Reset Account</button>
    </div>
  </div>

  <div class="grid" id="stats-grid"></div>

  <div class="section">
    <h2>📍 Open Positions</h2>
    <div id="positions"><div class="empty">No open positions</div></div>
  </div>

  <div class="section">
    <h2>📜 Recent Trades</h2>
    <div id="trades-table"></div>
  </div>

  <script>
    async function fetchStats() {
      try {
        const res = await fetch('/api/stats');
        return await res.json();
      } catch (e) { return null; }
    }

    function renderStats(stats) {
      if (!stats) return;
      const pnlColor = stats.totalPnL >= 0 ? 'green' : 'red';
      const wrColor = parseFloat(stats.winRate) >= 50 ? 'green' : parseFloat(stats.winRate) >= 40 ? 'yellow' : 'red';

      document.getElementById('stats-grid').innerHTML = `
        <div class="card"><div class="label">Balance</div><div class="value">$${stats.balance.toLocaleString()}</div></div>
        <div class="card"><div class="label">Total PnL</div><div class="value ${pnlColor}">$${stats.totalPnL >= 0 ? '+' : ''}${stats.totalPnL}</div></div>
        <div class="card"><div class="label">PnL %</div><div class="value ${pnlColor}">${stats.totalPnLPercent >= 0 ? '+' : ''}${stats.totalPnLPercent}%</div></div>
        <div class="card"><div class="label">Win Rate</div><div class="value ${wrColor}">${stats.winRate}%</div></div>
        <div class="card"><div class="label">Profit Factor</div><div class="value blue">${stats.profitFactor}</div></div>
        <div class="card"><div class="label">Total Trades</div><div class="value">${stats.totalTrades}</div></div>
        <div class="card"><div class="label">Max Drawdown</div><div class="value red">${stats.maxDrawdown}</div></div>
        <div class="card"><div class="label">Total Fees</div><div class="value gray">$${stats.totalFees}</div></div>
      `;

      // Positions
      const posDiv = document.getElementById('positions');
      if (stats.positions.length === 0) {
        posDiv.innerHTML = '<div class="empty">No open positions</div>';
      } else {
        posDiv.innerHTML = stats.positions.map(p => `
          <div class="pos-card">
            <div>
              <span class="symbol">${p.symbol}</span>
              <span class="tag tag-${p.side}">${p.side.toUpperCase()}</span>
            </div>
            <div class="details">
              Entry: $${p.entryPrice.toFixed(4)} | SL: $${p.stopLoss.toFixed(4)} | TP: $${p.takeProfit.toFixed(4)}<br>
              Regime: ${p.regime} | Score: ${p.score}
            </div>
          </div>
        `).join('');
      }

      // Trades
      const tableDiv = document.getElementById('trades-table');
      if (stats.recentTrades.length === 0) {
        tableDiv.innerHTML = '<div class="empty">No trades yet — waiting for signals</div>';
      } else {
        tableDiv.innerHTML = `<table>
          <tr><th>Symbol</th><th>Side</th><th>Entry</th><th>Exit</th><th>PnL</th><th>%</th><th>Reason</th><th>Regime</th><th>Duration</th></tr>
          ${stats.recentTrades.map(t => `
            <tr>
              <td>${t.symbol}</td>
              <td><span class="tag tag-${t.side}">${t.side.toUpperCase()}</span></td>
              <td>$${t.entryPrice.toFixed(4)}</td>
              <td>$${t.exitPrice.toFixed(4)}</td>
              <td class="${t.pnl >= 0 ? 'green' : 'red'}" style="color: inherit">$${t.pnl >= 0 ? '+' : ''}${t.pnl}</td>
              <td><span class="tag ${t.pnl >= 0 ? 'tag-win' : 'tag-loss'}">${t.pnlPercent >= 0 ? '+' : ''}${t.pnlPercent}%</span></td>
              <td>${t.closeReason}</td>
              <td>${t.regime}</td>
              <td>${t.durationMin}m</td>
            </tr>
          `).join('')}
        </table>`;
      }
    }

    async function resetAccount() {
      if (!confirm('Reset paper trading account to $10,000? All history will be lost.')) return;
      await fetch('/api/reset', { method: 'POST' });
      refresh();
    }

    async function refresh() {
      const stats = await fetchStats();
      renderStats(stats);
    }

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
